name: Bug Report
description: Report a bug or rendering issue
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to report a bug! Please fill out the form below as accurately as possible.
  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
      placeholder: |
        e.g., When opening the ColorPickerOverlay on Minecraft 1.21.11, the game crashes with a NullPointerException...
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How do we reproduce this issue?
      placeholder: |
        1. Open the config screen via ModMenu or /shelf config
        2. Click on any ColorPickerWidget
        3. Observe the crash / visual bug...
    validations:
      required: true
  - type: input
    id: mc-version
    attributes:
      label: Minecraft Version(s)
      placeholder: e.g., 1.21.11, 1.20.1
    validations:
      required: true
  - type: input
    id: fabric-version
    attributes:
      label: Fabric Loader / API Version
      placeholder: e.g., Loader 0.16.0, API 0.102.0+1.21.11
    validations:
      required: false
  - type: textarea
    id: crash-report
    attributes:
      label: Logs or Crash Reports
      description: Please paste relevant log files, crash reports, or stack traces here (use code blocks).
      placeholder: |
        ```
        [Paste your logs here]
        ```
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or Video
      description: Drag and drop screenshots or paste video links that help illustrate the bug.
